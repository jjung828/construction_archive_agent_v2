name: Collect construction archive

on:
  workflow_dispatch:
  schedule:
    # KST 00:00 = UTC 15:00 previous day
    # KST 12:00 = UTC 03:00
    - cron: "0 3,15 * * *"

permissions:
  contents: write

concurrency:
  group: construction-archive-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      USE_LLM: ${{ secrets.USE_LLM }}
      LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: |
          python -m playwright install chromium
        continue-on-error: true

      - name: Ensure data folders
        run: |
          mkdir -p data reports data/logos

      - name: Run collector
        run: |
          python main.py

      - name: Compact archive
        run: |
          python maintenance/compact_archive.py

      - name: Commit updated archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data reports
          if git diff --cached --quiet; then
            echo "No archive changes to commit."
          else
            git commit -m "Update construction archive [skip ci]"
            git pull --rebase
            git push
          fi
